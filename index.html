<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Muhammad Ramadhan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f8fafc; }
        .hero-avatar { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); text-align: center; max-width: 350px; }
        .profile-img { width: 150px; height: 150px; object-fit: cover; border-radius: 50%; border: 4px solid #3b82f6; }
        h3 { margin-top: 1rem; color: #1e293b; }
        p { color: #475569; font-size: 0.9rem; margin-bottom: 1rem; }
        .location { color: #64748b; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="hero-avatar">
    <img src="foto-profil.jpg" class="profile-img" alt="Muhammad Ramadhan">
    
    <h3>Muhammad Ramadhan, S.T.</h3>
    <p>Maintenance Supervisor | PLC | IoT | HV/LV Panel</p>
    
    <div class="location">
        <i class="fas fa-map-marker-alt"></i> Indonesia
    </div>
</div>

</body>
</html>
